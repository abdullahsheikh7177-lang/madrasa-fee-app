<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>নোটিশ</title>
</head>

<body>

<h2>📢 নতুন নোটিশ</h2>

<textarea id="noticeInput" rows="5" cols="35"
placeholder="এখানে নোটিশ লিখুন"></textarea>

<br><br>

<button id="submitNotice">Submit</button>

<hr>

<div id="noticeList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
initializeFirestore,
persistentLocalCache,
persistentSingleTabManager,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhdamD0ApIaUeW0km2uSA7ksmGJO8f5Po",
  authDomain: "madrasa-fee-app.firebaseapp.com",
  projectId: "madrasa-fee-app",
  storageBucket: "madrasa-fee-app.firebasestorage.app",
  messagingSenderId: "1011327270340",
  appId: "1:1011327270340:web:b51a08befa3aafce4a7891",
  measurementId: "G-ZT4457XDKS"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app,{
  localCache:persistentLocalCache({
    tabManager:persistentSingleTabManager()
  })
});

async function loadNotice(){

    const list=document.getElementById("noticeList");
    list.innerHTML="";

    const q=query(collection(db,"notice"),orderBy("createdAt","desc"));

    const snapshot=await getDocs(q);

    snapshot.forEach(doc=>{

        list.innerHTML+=`
        <div style="border:1px solid #ccc;padding:10px;margin:10px;border-radius:5px;">
        📢 ${doc.data().text}
        </div>
        `;

    });

}

loadNotice();

document.getElementById("submitNotice").onclick=async function(){

    let text=document.getElementById("noticeInput").value.trim();

    if(text==""){
        alert("নোটিশ লিখুন");
        return;
    }

    await addDoc(collection(db,"notice"),{

        text:text,
        createdAt:Date.now()

    });

    document.getElementById("noticeInput").value="";

    loadNotice();

};



let notices = [];

// নোটিশ লোড
async function loadNotice() {

    // আগে localStorage থেকে দেখাবে
    const cache = localStorage.getItem("notice");

    if (cache) {
        notices = JSON.parse(cache);
        showNotice();
    }

    // তারপর Firebase থেকে আপডেট করবে
    if (navigator.onLine) {

        const q = query(collection(db, "notice"), orderBy("createdAt", "desc"));

        const snapshot = await getDocs(q);

        notices = [];

        snapshot.forEach((doc) => {

            notices.push({
                id: doc.id,
                ...doc.data()
            });

        });

        localStorage.setItem("notice", JSON.stringify(notices));

        showNotice();

    }

}

// নোটিশ দেখাবে
function showNotice() {

    let html = "";

    notices.forEach(function(item){

        html += `
        <div style="border:1px solid #999;padding:10px;margin:10px;border-radius:8px;">
        📢 ${item.text}
        </div>
        `;

    });

    document.getElementById("noticeList").innerHTML = html;

}

loadNotice();


// Submit
document.getElementById("submitNotice").onclick = async function(){

    let text = document.getElementById("noticeInput").value.trim();

    if(text==""){
        alert("নোটিশ লিখুন");
        return;
    }

    const newNotice = {

        id:"local_"+Date.now(),

        text:text,

        createdAt:Date.now()

    };

    // আগে localStorage-এ সেভ
    notices.unshift(newNotice);

    localStorage.setItem("notice", JSON.stringify(notices));

    showNotice();

    // তারপর Firebase-এ সেভ
    try{

        await addDoc(collection(db,"notice"),{

            text:text,

            createdAt:Date.now()

        });

        await loadNotice();

    }catch(e){

        console.log("Offline Mode");

    }

    document.getElementById("noticeInput").value="";

};
  

</script>

</body>
</html>
